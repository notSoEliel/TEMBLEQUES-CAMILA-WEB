name: MCP Staging Smoke

on:
  workflow_dispatch:

jobs:
  mcp-tools:
    name: MCP tools on staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install

      - name: Validate required staging secrets
        env:
          E2E_STAGING_URL: ${{ secrets.STAGING_FRONTEND_URL }}
          E2E_MCP_REMOTE_URL: ${{ secrets.MCP_REMOTE_URL }}
          E2E_MCP_BACKEND_URL: ${{ secrets.STAGING_BACKEND_URL }}
          MCP_ADMIN_API_KEY: ${{ secrets.MCP_ADMIN_API_KEY }}
          MCP_CLIENT_API_KEY: ${{ secrets.MCP_CLIENT_API_KEY }}
          E2E_MCP_BACKEND_ADMIN_TOKEN: ${{ secrets.MCP_BACKEND_ADMIN_TOKEN }}
        run: |
          test -n "$E2E_STAGING_URL"
          test -n "$E2E_MCP_REMOTE_URL"
          test -n "$E2E_MCP_BACKEND_URL"
          test -n "$MCP_ADMIN_API_KEY"
          test -n "$MCP_CLIENT_API_KEY"
          test -n "$E2E_MCP_BACKEND_ADMIN_TOKEN"

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run MCP smoke
        env:
          E2E_MCP_SMOKE: "true"
          E2E_STAGING_URL: ${{ secrets.STAGING_FRONTEND_URL }}
          E2E_MCP_REMOTE_URL: ${{ secrets.MCP_REMOTE_URL }}
          E2E_MCP_BACKEND_URL: ${{ secrets.STAGING_BACKEND_URL }}
          MCP_ADMIN_API_KEY: ${{ secrets.MCP_ADMIN_API_KEY }}
          MCP_CLIENT_API_KEY: ${{ secrets.MCP_CLIENT_API_KEY }}
          E2E_MCP_BACKEND_ADMIN_TOKEN: ${{ secrets.MCP_BACKEND_ADMIN_TOKEN }}
          E2E_MCP_OAUTH_TOKEN: ${{ secrets.E2E_MCP_OAUTH_TOKEN }}
        run: bunx playwright test tests/e2e/mcp-staging.spec.ts

      - name: Upload MCP smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcp-staging-smoke-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
