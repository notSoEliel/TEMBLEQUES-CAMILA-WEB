name: Respaldo cifrado de MongoDB

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    name: Crear respaldo cifrado
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Instalar dependencias del backend
        working-directory: backend
        run: bun install --frozen-lockfile

      - name: Crear respaldo cifrado
        working-directory: backend
        env:
          APP_ENV: staging
          MONGO_URI: ${{ secrets.MONGO_URI }}
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
          BACKUP_OUTPUT_DIR: /tmp/tembleques-backups
        run: bun run backup

      - name: Conservar artefacto cifrado
        uses: actions/upload-artifact@v4
        with:
          name: mongodb-backup-${{ github.run_id }}
          path: /tmp/tembleques-backups/*.json.enc
          if-no-files-found: error
          retention-days: 30
