name: Staging Smoke

on:
  workflow_dispatch:

jobs:
  real-integrations:
    name: Clerk and Stripe test on staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install

      - name: Validate required staging secrets
        env:
          STAGING_FRONTEND_URL: ${{ secrets.STAGING_FRONTEND_URL }}
          E2E_BACKEND_URL: ${{ secrets.STAGING_BACKEND_URL }}
          E2E_CLERK_EMAIL: ${{ secrets.E2E_CLERK_EMAIL }}
          E2E_CLERK_ADMIN_EMAIL: ${{ secrets.E2E_CLERK_ADMIN_EMAIL }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          MCP_BACKEND_ADMIN_TOKEN: ${{ secrets.MCP_BACKEND_ADMIN_TOKEN }}
        run: |
          test -n "$STAGING_FRONTEND_URL"
          test -n "$E2E_BACKEND_URL"
          test -n "$E2E_CLERK_EMAIL"
          test -n "$E2E_CLERK_ADMIN_EMAIL"
          test -n "$CLERK_SECRET_KEY"
          test -n "$CLERK_PUBLISHABLE_KEY"
          test -n "$MCP_BACKEND_ADMIN_TOKEN"

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Build exact staging frontend artifact
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.STAGING_BACKEND_URL }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
        run: bun run build

      - name: Start exact staging frontend artifact
        working-directory: frontend
        run: |
          bunx vite preview --host 0.0.0.0 --port 5173 > /tmp/staging-frontend.log 2>&1 &
          for attempt in $(seq 1 30); do
            if curl -fsS http://localhost:5173/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/staging-frontend.log
          exit 1

      - name: Verify remote staging seed namespace
        env:
          E2E_BACKEND_URL: ${{ secrets.STAGING_BACKEND_URL }}
          MCP_BACKEND_ADMIN_TOKEN: ${{ secrets.MCP_BACKEND_ADMIN_TOKEN }}
        run: |
          response=$(curl -fsS \
            -H "Authorization: Bearer $MCP_BACKEND_ADMIN_TOKEN" \
            "$E2E_BACKEND_URL/api/admin/seed-status")
          echo "$response" | jq
          test "$(echo "$response" | jq -r '.environment')" = "staging"
          test "$(echo "$response" | jq -r '.seed.enabled')" = "true"
          test "$(echo "$response" | jq -r '.seed.profile')" = "staging"
          test "$(echo "$response" | jq -r '.seed.namespace.products')" = "12"
          test "$(echo "$response" | jq -r '.seed.namespace.rentals')" = "3"
          test "$(echo "$response" | jq -r '.seed.namespace.users')" = "2"
          test "$(echo "$response" | jq -r '.seed.namespace.termsAcceptances')" = "3"

      - name: Run real staging smoke tests
        run: bun run test:e2e:staging
        env:
          E2E_STAGING_URL: http://localhost:5173
          E2E_BACKEND_URL: ${{ secrets.STAGING_BACKEND_URL }}
          E2E_REAL_INTEGRATIONS: "true"
          E2E_CLERK_EMAIL: ${{ secrets.E2E_CLERK_EMAIL }}
          E2E_CLERK_ADMIN_EMAIL: ${{ secrets.E2E_CLERK_ADMIN_EMAIL }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          E2E_STRIPE_TEST_CARD: ${{ secrets.E2E_STRIPE_TEST_CARD }}
          E2E_STRIPE_TEST_EXPIRY: ${{ secrets.E2E_STRIPE_TEST_EXPIRY }}
          E2E_STRIPE_TEST_CVC: ${{ secrets.E2E_STRIPE_TEST_CVC }}
          E2E_STRIPE_TEST_EMAIL: ${{ secrets.E2E_STRIPE_TEST_EMAIL }}
          E2E_MCP_BACKEND_ADMIN_TOKEN: ${{ secrets.MCP_BACKEND_ADMIN_TOKEN }}

      - name: Run phase 3 operational evidence
        run: bunx playwright test tests/e2e/staging-phase3.spec.ts
        env:
          E2E_STAGING_URL: http://localhost:5173
          E2E_BACKEND_URL: ${{ secrets.STAGING_BACKEND_URL }}
          E2E_REAL_INTEGRATIONS: "true"
          E2E_CLERK_EMAIL: ${{ secrets.E2E_CLERK_EMAIL }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          E2E_MCP_BACKEND_ADMIN_TOKEN: ${{ secrets.MCP_BACKEND_ADMIN_TOKEN }}

      - name: Upload staging smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-smoke-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
