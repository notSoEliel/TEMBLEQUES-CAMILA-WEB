name: Staging Smoke

on:
  workflow_dispatch:

jobs:
  real-integrations:
    name: Clerk and Stripe test on staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install

      - name: Validate required staging secrets
        env:
          E2E_STAGING_URL: ${{ secrets.STAGING_FRONTEND_URL }}
          E2E_CLERK_EMAIL: ${{ secrets.E2E_CLERK_EMAIL }}
          E2E_CLERK_PASSWORD: ${{ secrets.E2E_CLERK_PASSWORD }}
        run: |
          test -n "$E2E_STAGING_URL"
          test -n "$E2E_CLERK_EMAIL"
          test -n "$E2E_CLERK_PASSWORD"

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run real staging smoke tests
        run: bun run test:e2e:staging
        env:
          E2E_STAGING_URL: ${{ secrets.STAGING_FRONTEND_URL }}
          E2E_REAL_INTEGRATIONS: "true"
          E2E_CLERK_EMAIL: ${{ secrets.E2E_CLERK_EMAIL }}
          E2E_CLERK_PASSWORD: ${{ secrets.E2E_CLERK_PASSWORD }}
          E2E_STRIPE_TEST_CARD: ${{ secrets.E2E_STRIPE_TEST_CARD }}
          E2E_STRIPE_TEST_EXPIRY: ${{ secrets.E2E_STRIPE_TEST_EXPIRY }}
          E2E_STRIPE_TEST_CVC: ${{ secrets.E2E_STRIPE_TEST_CVC }}

      - name: Upload staging smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-smoke-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
